<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Gestión de Citas</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Gestión de Citas Médicas</h1>

      <!-- FORMULARIO -->
      <form id="formCita">
        <input type="hidden" id="citaId" />

        <form id="formCita">
          <input type="hidden" id="citaId" />

          <label for="paciente_id">Paciente:</label>
          <input type="number" id="paciente_id" placeholder="Ej: 1" required />

          <label for="medico_id">Médico:</label>
          <input type="number" id="medico_id" placeholder="Ej: 2" required />

          <label for="fecha_cita">Fecha de la cita:</label>
          <input type="datetime-local" id="fecha_cita" required />

          <label for="motivo">Motivo:</label>
          <input
            type="text"
            id="motivo"
            placeholder="Ej: Dolor de cabeza, chequeo general"
          />

          <label for="estado">Estado:</label>
          <select id="estado">
            <option value="pendiente">Pendiente</option>
            <option value="confirmada">Confirmada</option>
            <option value="cancelada">Cancelada</option>
            <option value="completada">Completada</option>
          </select>

          <button type="submit">Guardar</button>
        </form>
      </form>

      <!-- LISTA -->
      <div id="listaCitas"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
